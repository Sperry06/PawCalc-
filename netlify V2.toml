# netlify.toml — PawCalc
[build]
  publish = "."

[[redirects]]
  from   = "/api/subscribe"
  to     = "/.netlify/functions/subscribe"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "interest-cohort=()"
    # SEC-07: 'unsafe-inline' removed from script-src — all inline handlers replaced with addEventListener
    Content-Security-Policy   = "default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.api.mailchimp.com https://www.google-analytics.com; frame-ancestors 'self';"
