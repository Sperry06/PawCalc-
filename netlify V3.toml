# netlify.toml — PawCalc
[build]
  publish = "."

[[redirects]]
  from   = "/api/subscribe"
  to     = "/.netlify/functions/subscribe"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "interest-cohort=()"
    # SEC-07: 'unsafe-inline' removed — all onclick replaced with addEventListener
    # AdSense: googlesyndication.com / doubleclick.net added for ad serving
    Content-Security-Policy   = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://*.googlesyndication.com https://*.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.api.mailchimp.com https://www.google-analytics.com https://*.googlesyndication.com https://*.doubleclick.net; frame-src https://*.googlesyndication.com https://*.doubleclick.net; frame-ancestors 'self';"
